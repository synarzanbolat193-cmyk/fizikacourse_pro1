                    { q: "Балқу жылуы қандай әріппен белгіленеді?", opts: ["λ", "L", "c", "q"], correct: 0 },
                    { q: "Булану жылуы қай формула?", opts: ["Q = Lm", "Q = λm", "Q = mcΔT", "Q = qm"], correct: 0 },
                    { q: "Меншікті жылусыйымдылық өлшем бірлігі?", opts: ["Дж/кг·°C", "Дж/кг", "Дж/°C", "Вт/кг"], correct: 0 },
                    { q: "1 кг суды 1°C-қа қыздыру үшін қанша жылу керек? (c=4200)", opts: ["4200 Дж", "420 Дж", "42 Дж", "42000 Дж"], correct: 0 }
                ]
            }
        ]
    }
};

// Барлық формулаларды жинау
let allFormulas = [];
for (let m in modulesData) {
    for (let t of modulesData[m].topics) {
        for (let f of t.formulas) {
            allFormulas.push({ module: m, topic: t.name, formula: f });
        }
    }
}

// ============ ПРОГРЕСС (LOCALSTORAGE) ============
let progress = JSON.parse(localStorage.getItem("physics_progress")) || {};

function isTopicCompleted(moduleName, topicName) {
    return progress[moduleName] ? progress[moduleName].includes(topicName) : false;
}

function setTopicCompleted(moduleName, topicName, completed) {
    if (!progress[moduleName]) progress[moduleName] = [];
    if (completed && !progress[moduleName].includes(topicName)) {
        progress[moduleName].push(topicName);
    } else if (!completed) {
        progress[moduleName] = progress[moduleName].filter(t => t !== topicName);
    }
    localStorage.setItem("physics_progress", JSON.stringify(progress));
    renderModules();
    updateGlobalProgress();
}

function resetProgress() {
    if (confirm("Барлық прогресті нөлдеу керек пе? Бұл әрекетті қайтару мүмкін емес!")) {
        progress = {};
        localStorage.setItem("physics_progress", JSON.stringify(progress));
        renderModules();
        updateGlobalProgress();
    }
}

function modulePercent(moduleName) {
    let topics = modulesData[moduleName].topics;
    let done = topics.filter(t => isTopicCompleted(moduleName, t.name)).length;
    return topics.length ? Math.floor(done / topics.length * 100) : 0;
}

function globalPercent() {
    let total = 0, done = 0;
    for (let m in modulesData) {
        total += modulesData[m].topics.length;
        done += modulesData[m].topics.filter(t => isTopicCompleted(m, t.name)).length;
    }
    return total ? Math.floor(done / total * 100) : 0;
}

function updateGlobalProgress() {
    let gp = globalPercent();
    document.getElementById("globalFill").style.width = gp + "%";
    document.getElementById("globalPercent").innerText = gp + "%";
}

function renderModules() {
    let container = document.getElementById("modulesContainer");
    if (!container) return;
    let html = "";
    for (let modName in modulesData) {
        let percent = modulePercent(modName);
        let modId = modName.replace(/\s/g, '');
        html += `<div class="module-card">
            <div class="module-title" onclick="toggleModule(this)">
                <span>📚 ${modName}</span>
                <span class="module-progress">${percent}%</span>
            </div>
            <div class="module-content" id="modContent_${modId}">`;
        for (let i = 0; i < modulesData[modName].topics.length; i++) {
            let topic = modulesData[modName].topics[i];
            let completed = isTopicCompleted(modName, topic.name);
            html += `<div class="topic">
                <div class="topic-header" onclick="toggleTopic(this)">
                    <span class="topic-title">📘 ${topic.name}</span>
                    <input type="checkbox" class="topic-check" data-mod="${modName}" data-topic="${topic.name}" ${completed ? 'checked' : ''}>
                </div>
                <div class="topic-detail">
                    <div class="theory">${topic.theory.replace(/\n/g, '<br>')}</div>
                    <div><strong>📐 Формулалар:</strong>`;
            for (let f of topic.formulas) {
                html += `<div class="formula">📌 ${f}</div>`;
            }
            html += `</div><div><strong>✏️ Тапсырма:</strong>
                    <div class="task">
                        <p>${topic.task.q}</p>
                        <input type="text" id="task_inp_${modName}_${i}" placeholder="Жауабыңыз">
                        <button onclick="checkTask('${modName}', ${i}, '${topic.task.ans}')">Тексеру</button>
                        <div id="task_fb_${modName}_${i}" class="feedback-error"></div>
                    </div>
                </div><div><strong>📝 Тест сұрақтары (5 сұрақ):</strong>`;
            for (let t = 0; t < topic.tests.length; t++) {
                let test = topic.tests[t];
                html += `<div class="test">
                    <p><strong>${t+1}. ${test.q}</strong></p>`;
                for (let opt = 0; opt < test.opts.length; opt++) {
                    html += `<label class="test-option">
                        <input type="radio" name="test_${modName}_${i}_${t}" value="${opt}">
                        ${String.fromCharCode(65+opt)}. ${test.opts[opt]}
                    </label>`;
                }
                html += `<button onclick="checkTest('${modName}', ${i}, ${t}, ${test.correct})">Тексеру</button>
                    <div id="test_fb_${modName}_${i}_${t}" class="feedback-error"></div>
                </div>`;
            }
            html += `</div></div></div>`;
        }
        html += `</div></div>`;
    }
    container.innerHTML = html;
    
    document.querySelectorAll(".topic-check").forEach(cb => {
        cb.addEventListener("change", function(e) {
            e.stopPropagation();
            let mod = this.getAttribute("data-mod");
            let topic = this.getAttribute("data-topic");
            setTopicCompleted(mod, topic, this.checked);
        });
    });
}

function renderFormulas() {
    let container = document.getElementById("formulasList");
    if (!container) return;
    let html = "";
    for (let f of allFormulas) {
        html += `<div class="formula-item"><strong>${f.module} / ${f.topic}</strong><br>📌 ${f.formula}</div>`;
    }
    container.innerHTML = html;
}

window.toggleModule = function(el) {
    let content = el.nextElementSibling;
    if (content) content.style.display = content.style.display === "block" ? "none" : "block";
};
window.toggleTopic = function(el) {
    let detail = el.parentElement.querySelector(".topic-detail");
    if (detail) detail.style.display = detail.style.display === "block" ? "none" : "block";
};
window.checkTask = function(mod, topicIdx, correct) {
    let input = document.getElementById(`task_inp_${mod}_${topicIdx}`);
    let fb = document.getElementById(`task_fb_${mod}_${topicIdx}`);
    if (!input || !fb) return;
    let userVal = input.value.trim().toLowerCase();
    let isOk = false;
    if (!isNaN(correct) && !isNaN(userVal)) {
        isOk = Math.abs(parseFloat(userVal) - parseFloat(correct)) < 0.01;
    } else {
        isOk = userVal === correct.toString().toLowerCase();
    }
    fb.innerHTML = isOk ? "✅ Дұрыс! Жарайсың!" : `❌ Қате. Дұрысы: ${correct}`;
    fb.className = isOk ? "feedback-success" : "feedback-error";
};
window.checkTest = function(mod, topicIdx, testIdx, correct) {
    let radios = document.getElementsByName(`test_${mod}_${topicIdx}_${testIdx}`);
    let selected = null;
    for (let i = 0; i < radios.length; i++) {
        if (radios[i].checked) { selected = parseInt(radios[i].value); break; }
    }
    let fb = document.getElementById(`test_fb_${mod}_${topicIdx}_${testIdx}`);
    if (selected === null) {
        fb.innerHTML = "❌ Жауап таңдаңыз!";
        fb.className = "feedback-error";
        return;
    }
    let letters = ["A", "B", "C", "D"];
    if (selected === correct) {
        fb.innerHTML = "✅ Дұрыс! Жауабыңыз дұрыс!";
        fb.className = "feedback-success";
    } else {
        fb.innerHTML = `❌ Қате. Дұрыс жауап: ${letters[correct]}`;
        fb.className = "feedback-error";
    }
};

function initCalc() {
    let btn = document.getElementById("calcBtn");
    let input = document.getElementById("calcInput");
    let result = document.getElementById("calcResult");
    if (btn) {
        btn.onclick = function() {
            try {
                let res = eval(input.value);
                result.innerHTML = "= " + res;
            } catch(e) {
                result.innerHTML = "Қате өрнек";
            }
        };
    }
}

// Прогресті нөлдеу батырмасы
document.getElementById("resetProgressBtn").onclick = resetProgress;

// Бастау
renderModules();
renderFormulas();
updateGlobalProgress();
initCalc();
</script>
</body>
</html>
